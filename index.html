<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Planner" />
    <meta name="theme-color" content="#f7f2e9" />
    <title>School Psychology Planner</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css?v=2026-06-09-instant-pencil-handoff" />
  </head>
  <body>
    <main class="app">
      <aside class="month-tabs" id="monthTabs" aria-label="Months"></aside>

      <section class="planner">
        <img class="botanical botanical-top" src="assets/eucalyptus-corner.svg" alt="" />
        <img class="botanical botanical-bottom" src="assets/ivy-sprig.svg" alt="" />
        <header class="topbar">
          <button class="icon-button" id="prevWeek" aria-label="Previous day" title="Previous day">‹</button>
          <div>
            <p class="eyebrow">School Psychology Planner</p>
            <h1 id="monthTitle">May 2026</h1>
          </div>
          <div class="week-nav">
            <select id="weekSelect" aria-label="Work day"></select>
            <button class="icon-button" id="nextWeek" aria-label="Next day" title="Next day">›</button>
          </div>
        </header>

        <section class="toolbar" aria-label="Drawing tools">
          <button class="tool sticky-action" id="addStickyButton">Add Post-it</button>
          <select id="stickerSelect" aria-label="Sticker type">
            <option value="etr">ETR Meeting</option>
            <option value="504">504 Meeting</option>
            <option value="iep">IEP Meeting</option>
            <option value="eval">Evaluation</option>
            <option value="re-eval">Re-Eval</option>
            <option value="consult">Consult</option>
            <option value="parent">Parent Call</option>
            <option value="testing">Testing</option>
            <option value="report">Report Due</option>
            <option value="deadline">Deadline</option>
            <option value="no-school">No School</option>
            <option value="conference">Conference</option>
          </select>
          <button class="tool sticker-action" id="addStickerButton">Add Sticker</button>
          <label class="toggle-label">
            <input id="pencilOnlyInput" type="checkbox" />
            Strict Pencil only
          </label>
          <span class="toolbar-divider" aria-hidden="true"></span>
          <button class="tool" id="todayButton">Today</button>
          <button class="tool" id="exportButton">Export Backup</button>
          <button class="tool" id="importButton">Import Backup</button>
          <input id="importInput" class="visually-hidden" type="file" accept="application/json,.json" />
          <button class="tool" id="undoButton">Undo</button>
          <button class="tool" id="clearButton">Clear Area</button>
        </section>
        <section class="backup-reminder" id="backupReminder" hidden>
          <span>Backup recommended</span>
          <button class="tool" id="backupNowButton">Export Backup</button>
        </section>

        <section class="month-panel">
          <div class="section-title">
            <h2 id="calendarHeading">Month View</h2>
            <p>Write evaluations, consults, meetings, and school-wide dates once.</p>
          </div>
          <div class="calendar-wrap writing-surface" data-surface="month">
            <div id="calendarGrid" class="calendar-grid"></div>
            <div class="month-support-grid">
              <section class="month-pad consult-pad">
                <h3>Consult Log Scratch</h3>
                <div class="pad-lines"></div>
              </section>
              <section class="month-pad parking-pad">
                <h3>Parking Lot</h3>
                <div class="pad-lines"></div>
              </section>
            </div>
            <canvas id="monthCanvas" aria-label="Month handwriting layer"></canvas>
            <div id="monthStickyLayer" class="sticky-layer" aria-label="Month post-its"></div>
            <div id="monthStickerLayer" class="sticker-layer" aria-label="Month stickers"></div>
          </div>
        </section>

        <section class="week-panel">
          <div class="section-title">
            <h2 id="weekHeading">Daily Focus</h2>
            <p>Daily to-dos save separately for each school day.</p>
          </div>
          <div class="week-wrap writing-surface" data-surface="week">
            <div class="task-sidebar">
              <div class="task-box sage">
                <h3>Priorities</h3>
                <span></span><span></span><span></span>
              </div>
              <div class="task-box lilac">
                <h3>Evaluations To Work On</h3>
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <div class="task-box clay">
                <h3>Follow-Up Calls + Emails</h3>
                <span></span><span></span><span></span><span></span>
              </div>
            </div>
            <div id="weekGrid" class="week-grid"></div>
            <canvas id="weekCanvas" aria-label="Week handwriting layer"></canvas>
            <div id="weekStickyLayer" class="sticky-layer" aria-label="Week post-its"></div>
            <div id="weekStickerLayer" class="sticker-layer" aria-label="Week stickers"></div>
          </div>
        </section>
      </section>
    </main>

    <nav class="floating-mode-tools" aria-label="Quick planner input mode">
      <button class="tool active" id="quickWriteModeButton" aria-pressed="true">Write</button>
      <button class="tool" id="quickMoveModeButton" aria-pressed="false">Move</button>
      <span class="dock-divider" aria-hidden="true"></span>
      <button class="tool active" id="quickPenTool" aria-pressed="true">Pen</button>
      <button class="tool" id="quickHighlighterTool" aria-pressed="false">Highlight</button>
      <button class="tool" id="quickEraserTool" aria-pressed="false">Eraser</button>
      <label class="dock-control" aria-label="Writing color">
        <input id="quickColorInput" type="color" value="#3a3434" />
      </label>
      <label class="dock-size" aria-label="Writing size">
        <input id="quickSizeInput" type="range" min="1" max="14" value="3" />
      </label>
      <span class="dock-divider" aria-hidden="true"></span>
      <button class="tool dock-zoom" id="quickZoomOutButton" aria-label="Zoom out">−</button>
      <button class="tool dock-zoom-level" id="quickZoomResetButton" title="Reset zoom">100%</button>
      <button class="tool dock-zoom" id="quickZoomInButton" aria-label="Zoom in">+</button>
    </nav>

    <script src="app.js?v=2026-06-09-instant-pencil-handoff"></script>
  </body>
</html>
